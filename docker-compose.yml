services:
  mysql:
    image: mysql:8
    container_name: mysql_tienda
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: tienda_generica
    # puerto 3307 quitado — solo acceso interno entre contenedores
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - tienda_net

  frontend_1:
    build:
      context: ./frontend/Frontend
      dockerfile: Dockerfile.frontend
    container_name: frontend_1
    restart: on-failure
    networks:
      - tienda_net

  backend-usuarios_1:
    build: ./Backend/tienda_generica_users
    container_name: ms_usuarios_1
    restart: on-failure
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/tienda_generica?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SERVER_PORT: 8001
    networks:
      - tienda_net

  backend-productos_1:
    build: ./Backend/tienda_generica_producto-provedores
    container_name: ms_productos_1
    restart: on-failure
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/tienda_generica?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SERVER_PORT: 8002
    networks:
      - tienda_net

  backend-reportes_1:
    build: ./Backend/tienda_generica_ventas-reportes
    container_name: ms_reportes_1
    restart: on-failure
    depends_on:
      mysql:
        condition: service_healthy
      backend-usuarios_1:
        condition: service_started
      backend-productos_1:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/tienda_generica?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SERVER_PORT: 8003
      # ✅ nombre de servicio, no container_name
      MICRO_USUARIOS_URL: http://backend-usuarios_1:8001/api/usuarios
      MICRO_PRODUCTOS_URL: http://backend-productos_1:8002/api/productos
    networks:
      - tienda_net

  nginx:
    image: nginx:alpine
    container_name: nginx_balanceador
    restart: on-failure
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend_1
      - backend-usuarios_1
      - backend-productos_1
      - backend-reportes_1
    networks:
      - tienda_net

volumes:
  mysql_data:

networks:
  tienda_net:
    driver: bridge