events {}

http {
  server {
    listen 80;

    # Frontend React
   location / {
  proxy_pass http://frontend_1:80;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Microservicio usuarios
    location /api/usuarios/ {
      proxy_pass http://backend-usuarios_1:8001;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Microservicio productos
    location /api/productos/ {
      proxy_pass http://backend-productos_1:8002;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Microservicio reportes/ventas
    location /api/ {
      proxy_pass http://backend-reportes_1:8003;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}