events {}

http {
  server {
    listen 80;

    # -------------------------
    # Frontend React (SPA)
    # -------------------------
    location / {
      proxy_pass http://frontend_1:80;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # React necesita esto para manejar rutas internas
      try_files $uri /index.html;
    }

    # -------------------------
    # Microservicio Usuarios
    # -------------------------
    location /api/usuarios/ {
      proxy_pass http://backend-usuarios_1:8001/api/usuarios/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # -------------------------
    # Microservicio Clientes
    # (si lo tienes separado dentro de usuarios)
    # -------------------------
    location /api/usuarios/clientes/ {
      proxy_pass http://backend-usuarios_1:8001/api/usuarios/clientes/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # -------------------------
    # Microservicio Productos
    # -------------------------
    location /api/productos/ {
      proxy_pass http://backend-productos_1:8002/api/productos/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Proveedores
    location /api/productos/proveedores/ {
      proxy_pass http://backend-productos_1:8002/api/productos/proveedores/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Catálogo
    location /api/productos/catalogo/ {
      proxy_pass http://backend-productos_1:8002/api/productos/catalogo/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # -------------------------
    # Microservicio Reportes/Ventas
    # -------------------------
    location /api/reportes/ {
      proxy_pass http://backend-reportes_1:8003/api/reportes/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ventas/ {
      proxy_pass http://backend-reportes_1:8003/api/ventas/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # -------------------------
    # Optimización: gzip
    # -------------------------
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss;
    gzip_min_length 256;

    # -------------------------
    # Manejo de errores
    # -------------------------
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;
  }
}
