spring.application.name=ventas-reportes
# =====================================================
# CONFIGURACIï¿½N DEL SERVIDOR
# =====================================================
server.port=8083
server.servlet.context-path=/api/ventas

# =====================================================
# CONFIGURACIï¿½N DE LA BASE DE DATOS
# =====================================================
spring.datasource.url=jdbc:mysql://localhost:3306/tienda_generica_venta_reportes?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =====================================================
# CONFIGURACIï¿½N DE JPA / HIBERNATE
# =====================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# =====================================================
# URLs DE LOS OTROS MICROSERVICIOS
# =====================================================
microservicios.usuarios.url=http://localhost:8081/api/usuarios
microservicios.productos.url=http://localhost:8082/api/productos